name: Crawl Proxy

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时跑一次
  workflow_dispatch:      # 允许手动点运行

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run spider
        run: python proxy_spider.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add proxies.txt
          git commit -m "Auto update proxies $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push

