name: Crawl Proxy

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时执行一次
  workflow_dispatch:      # 支持手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run spider
        run: python proxy_spider.py

      - name: Debug - Check if proxies.txt exists
        run: |
          ls -la
          cat proxies.txt || echo "proxies.txt is empty or not found"

      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add proxies.txt
          # 即使没有变更，也不报错
          git commit -m "Auto update proxies $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push

