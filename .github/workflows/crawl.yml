name: Crawl Proxy
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run spider
        run: python proxy_spider.py

      - name: Debug file
        run: |
          echo "文件列表:"
          ls -l
          echo "文件内容:"
          cat proxies.txt

      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add proxies.txt
          git commit -m "Auto update proxies $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push

