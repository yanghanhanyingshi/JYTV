name: 灵鹿直播源更新❿

on:
  schedule:
    # 每3小时执行一次 (UTC时间)
    - cron: '0 */3 * * *'
  workflow_dispatch:   # 允许手动触发

jobs:
  update-sources:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许提交代码变更

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行爬虫
        run: python gaoqingtv.py

      - name: 提交更新文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gaoqingtv.txt gaoqing.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 自动更新直播源 [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
