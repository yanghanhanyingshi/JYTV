# filename: gaoqingtv.yml
name: 直播源爬虫更新

on:
  schedule:
    # 每天北京时间 8:00 运行（UTC 0:00）
    - cron: '0 0 * * *'
  workflow_dispatch:          # 允许手动触发

permissions:
  contents: write             # 允许提交文件

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 运行爬虫
        run: python gaoqingtv.py

      - name: 提交更新文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gaoqingtv.txt gaoqing.txt
          git diff --staged --quiet || git commit -m "自动更新直播源 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
