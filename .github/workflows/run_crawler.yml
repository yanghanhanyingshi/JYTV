name: Run Live Crawler

on:
  schedule:
    # 每天北京时间 08:00 运行（UTC+8 对应 UTC 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:   # 允许手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        env:
          CRAWLER_USERNAME: ${{ secrets.CRAWLER_USERNAME }}
          CRAWLER_PASSWORD: ${{ secrets.CRAWLER_PASSWORD }}
        run: python crawler.py
